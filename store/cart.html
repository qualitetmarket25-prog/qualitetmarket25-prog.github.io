<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Koszyk</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <main style="max-width:800px;margin:60px auto;font-family:Arial;padding:20px">
    <a href="./product.html">← Wróć do produktu</a>

    <h1>Koszyk</h1>

    <div id="cartBox" style="margin:30px 0"></div>

    <button id="clearBtn">Wyczyść koszyk</button>
    <button id="checkoutBtn">Przejdź do płatności</button>

    <div id="cartMsg" style="margin-top:14px;color:#6b7280"></div>
  </main>

  <script>
    (function () {
      "use strict";

      const CART_KEY = "cart";
      const ORDER_KEY = "order_v1";

      const box = document.getElementById("cartBox");
      const msg = document.getElementById("cartMsg");
      const clearBtn = document.getElementById("clearBtn");
      const checkoutBtn = document.getElementById("checkoutBtn");

      function readCartItem() {
        try {
          const raw = localStorage.getItem(CART_KEY);
          return raw ? JSON.parse(raw) : null; // u Ciebie: 1 obiekt
        } catch {
          return null;
        }
      }

      function buildOrderFromItem(item) {
        const price = Number(item.price) || 0;

        return {
          id: "ord_" + Date.now(),
          createdAt: new Date().toISOString(),
          currency: item.currency || "EUR",
          items: [
            {
              id: item.id ?? item.sku ?? item.slug ?? null,
              name: item.name ?? item.title ?? "Produkt",
              price: price,
              qty: 1,
              image: item.image ?? item.img ?? null
            }
          ],
          totals: { subtotal: price, shipping: 0, total: price },
          status: "created"
        };
      }

      function render() {
        const item = readCartItem();

        if (!item) {
          box.innerHTML = "<p>Koszyk jest pusty.</p>";
          checkoutBtn.disabled = true;
          return;
        }

        box.innerHTML = `
          <h3>${escapeHTML(item.name || "Produkt")}</h3>
          <p>Cena: ${escapeHTML(String(item.price ?? ""))} €</p>
        `;
      }

      function escapeHTML(s) {
        return String(s ?? "").replace(/[&<>"']/g, (c) => ({
          "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
        }[c]));
      }

      clearBtn.onclick = () => {
        localStorage.removeItem(CART_KEY);
        localStorage.removeItem(ORDER_KEY);
        location.reload();
      };

      checkoutBtn.onclick = () => {
        const item = readCartItem();
        if (!item) return;

        const order = buildOrderFromItem(item);
        localStorage.setItem(ORDER_KEY, JSON.stringify(order));

        // bez alertów – prosto na checkout
        window.location.href = "./checkout.html";
      };

      render();
    })();
  </script>

</body>
</html>
