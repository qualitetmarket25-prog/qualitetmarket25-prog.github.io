<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Koszyk</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <main style="max-width:800px;margin:60px auto;font-family:Arial;padding:20px">
    <a href="./product.html">← Wróć do produktu</a>

    <h1>Koszyk</h1>

    <div id="cartBox" style="margin:30px 0"></div>

    <button id="clearBtn">Wyczyść koszyk</button>
    <button id="checkoutBtn">Przejdź do płatności</button>
  </main>

  <script>
    const box = document.getElementById("cartBox");
    const clearBtn = document.getElementById("clearBtn");
    const checkoutBtn = document.getElementById("checkoutBtn");

    const raw = localStorage.getItem("cart");
    const item = raw ? JSON.parse(raw) : null;

    if (!item) {
      box.innerHTML = "<p>Koszyk jest pusty.</p>";
      checkoutBtn.disabled = true;
    } else {
      box.innerHTML = `
        <h3>${item.name}</h3>
        <p>Cena: ${item.price} €</p>
      `;
    }

    clearBtn.onclick = () => {
      localStorage.removeItem("cart");
      location.reload();
    };

    checkoutBtn.onclick = () => {
      alert("Tu podepniemy płatność (Stripe / PayPal).");
    };
  </script>

</body>
</html>
